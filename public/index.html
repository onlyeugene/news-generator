<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Aggregator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
  <div class="container mx-auto p-4">
    <!-- Header -->
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">News Aggregator</h1>

    <!-- News Feed Section -->
    <div class="mb-8">
      <h2 class="text-2xl font-semibold text-gray-700 mb-4">News Feed</h2>
      <button id="get-news-btn" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition mb-4">
        Get News
      </button>
      <div id="news-feed" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <!-- News articles will be appended here -->
      </div>
    </div>

    <!-- Summary Section -->
    <div class="bg-white p-6 rounded-lg shadow-md">
      <h2 class="text-2xl font-semibold text-gray-700 mb-4">Summarize Article</h2>
      <textarea id="article-input" class="w-full p-3 border rounded-lg mb-4" rows="4" placeholder="Enter article text or click an article above to summarize..."></textarea>
      <button id="summarize-btn" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition">
        Summarize
      </button>
      <div id="summary-output" class="mt-4 p-4 bg-gray-50 rounded-lg hidden">
        <h3 class="text-lg font-semibold text-gray-700">Summary</h3>
        <p id="summary-text" class="text-gray-600"></p>
      </div>
    </div>
  </div>

  <script src="/script.js"></script>
</body>
</html>
